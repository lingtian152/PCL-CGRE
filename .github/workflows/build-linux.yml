name: build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: install dependencies
        run: |
          sudo apt update
          sudo apt install cmake gtk4 libadwaita fontconfig libsoup3 libcurl json-glib adwaita-icon-theme

      - name: build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release . \&&
          cmake --build build --parallel $(nproc) \&&

      - name: upload release
        uses: actions/upload-artifact@v7
        with:
          name: PCL-CGRE
          path: |
            ./build/pcl-cgre
